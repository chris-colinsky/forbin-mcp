name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Read-only by default — CI runs tests, doesn't need to write anything back
# to the repo. Satisfies CodeQL's least-privilege check on GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
    - name: Install dependencies
      run: uv sync
    - name: Run tests
      run: uv run pytest
